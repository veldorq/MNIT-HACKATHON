services:
  - type: web
    name: newsguard-api
    env: python
    pythonVersion: 3.10
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 8000
    autoDeploy: true
